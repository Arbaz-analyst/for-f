<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>💍 For Fatima</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --rose: #c8384a;
      --blush: #f7d6d9;
      --gold: #c9a84c;
      --cream: #fdf6f0;
      --deep: #2a1a1f;
    }

    body {
      font-family: 'Lato', sans-serif;
      background: var(--cream);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* floating petals */
    .petal {
      position: fixed;
      width: 12px;
      height: 12px;
      background: radial-gradient(circle, #f9b8c2, #e05070);
      border-radius: 50% 0 50% 0;
      opacity: 0;
      pointer-events: none;
      animation: fall linear infinite;
    }

    @keyframes fall {
      0%   { transform: translateY(-60px) rotate(0deg); opacity: 0.8; }
      100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
    }

    /* === PROPOSAL CARD === */
    #proposal {
      text-align: center;
      padding: 60px 50px;
      max-width: 540px;
      width: 92%;
      background: white;
      border-radius: 24px;
      box-shadow: 0 30px 80px rgba(200,56,74,0.15), 0 0 0 1px rgba(201,168,76,0.2);
      position: relative;
      animation: fadeUp 1s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(40px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .ring-icon {
      font-size: 64px;
      display: block;
      animation: pulse 2s ease-in-out infinite;
      margin-bottom: 8px;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.12); }
    }

    .gold-line {
      width: 60px;
      height: 2px;
      background: var(--gold);
      margin: 20px auto;
      border-radius: 2px;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 6vw, 2.8rem);
      color: var(--deep);
      line-height: 1.2;
    }

    h1 span { color: var(--rose); font-style: italic; }

    .sub {
      font-size: 1rem;
      color: #7a5a62;
      margin: 18px 0 36px;
      line-height: 1.7;
      font-weight: 300;
    }

    .buttons {
      display: flex;
      gap: 16px;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      position: relative;
    }

    .btn {
      padding: 15px 40px;
      font-size: 1.05rem;
      font-family: 'Lato', sans-serif;
      font-weight: 400;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      letter-spacing: 0.04em;
    }

    #yes-btn {
      background: linear-gradient(135deg, var(--rose), #a02030);
      color: white;
      box-shadow: 0 8px 24px rgba(200,56,74,0.35);
    }

    #yes-btn:hover {
      transform: scale(1.06);
      box-shadow: 0 12px 32px rgba(200,56,74,0.5);
    }

    #no-btn {
      background: white;
      color: #aaa;
      border: 1.5px solid #ddd;
      position: absolute;
      right: 0;
      transition: all 0.15s ease;
      white-space: nowrap;
    }

    /* === CELEBRATION === */
    #celebration {
      display: none;
      text-align: center;
      padding: 60px 40px;
      max-width: 540px;
      width: 92%;
      background: white;
      border-radius: 24px;
      box-shadow: 0 30px 80px rgba(200,56,74,0.15);
      animation: fadeUp 0.8s ease both;
    }

    #celebration h2 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 7vw, 3rem);
      color: var(--rose);
      margin: 16px 0 10px;
    }

    #celebration p {
      color: #7a5a62;
      font-size: 1.05rem;
      line-height: 1.7;
      font-weight: 300;
      margin-top: 12px;
    }

    /* confetti */
    .confetti-piece {
      position: fixed;
      width: 10px;
      height: 10px;
      top: -20px;
      opacity: 0;
      pointer-events: none;
      animation: confettiFall 3s ease-in forwards;
    }

    @keyframes confettiFall {
      0%   { opacity: 1; transform: translateY(0) rotate(0deg); }
      100% { opacity: 0; transform: translateY(100vh) rotate(720deg); }
    }

    .heart-burst { font-size: 72px; animation: pop 0.5s cubic-bezier(0.175,0.885,0.32,1.275) both; }
    @keyframes pop {
      from { transform: scale(0); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body>

  <!-- Floating petals -->
  <script>
    for (let i = 0; i < 18; i++) {
      const p = document.createElement('div');
      p.className = 'petal';
      p.style.left = Math.random() * 100 + 'vw';
      p.style.animationDuration = (4 + Math.random() * 6) + 's';
      p.style.animationDelay = (Math.random() * 6) + 's';
      p.style.width = p.style.height = (8 + Math.random() * 10) + 'px';
      document.body.appendChild(p);
    }
  </script>

  <!-- Proposal Card -->
  <div id="proposal">
    <span class="ring-icon">💍</span>
    <div class="gold-line"></div>
    <h1>Will you marry me,<br><span>Fatima?</span></h1>
    <p class="sub">
      Every moment with you feels like home.<br>
      I want to spend forever with you — will you let me?
    </p>
    <div class="buttons">
      <button class="btn" id="yes-btn" onclick="celebrate()">Yes! 💖</button>
      <button class="btn" id="no-btn">No</button>
    </div>
  </div>

  <!-- Celebration Screen -->
  <div id="celebration">
    <div class="heart-burst">💑</div>
    <h2>She said YES! 🎉</h2>
    <div class="gold-line"></div>
    <p>
      My heart is the happiest it has ever been, <strong>Fatima</strong>. 💕<br>
      I promise to love you every single day, forever and always.
    </p>
    <p style="margin-top:24px; font-size:1.8rem;">🥂 🌹 💍 🎊</p>
  </div>

  <script>
    // Move "No" button away on hover (desktop) and touch (mobile)
    const noBtn = document.getElementById('no-btn');

    function runAway() {
      const vw = window.innerWidth;
      const vh = window.innerHeight;
      const bw = noBtn.offsetWidth;
      const bh = noBtn.offsetHeight;

      const nx = Math.random() * (vw - bw - 20) + 10;
      const ny = Math.random() * (vh - bh - 20) + 10;

      noBtn.style.position = 'fixed';
      noBtn.style.left = nx + 'px';
      noBtn.style.top  = ny + 'px';
      noBtn.style.right = 'auto';
      noBtn.style.transition = 'left 0.2s ease, top 0.2s ease';
    }

    // Desktop: run on hover
    noBtn.addEventListener('mouseover', runAway);

    // Mobile: run on touch, prevent the click from firing
    noBtn.addEventListener('touchstart', function(e) {
      e.preventDefault(); // stops the tap from becoming a click
      runAway();
    }, { passive: false });

    // Celebration
    function celebrate() {
      document.getElementById('proposal').style.display = 'none';
      document.getElementById('celebration').style.display = 'block';

      // Remove runaway No button if floating
      const no = document.getElementById('no-btn');
      if (no) no.remove();

      launchConfetti();
    }

    function launchConfetti() {
      const colors = ['#c8384a','#f7d6d9','#c9a84c','#ff6b9d','#fff'];
      for (let i = 0; i < 120; i++) {
        setTimeout(() => {
          const c = document.createElement('div');
          c.className = 'confetti-piece';
          c.style.left = Math.random() * 100 + 'vw';
          c.style.background = colors[Math.floor(Math.random() * colors.length)];
          c.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
          c.style.width = c.style.height = (6 + Math.random() * 8) + 'px';
          c.style.animationDuration = (2 + Math.random() * 2) + 's';
          c.style.animationDelay = '0s';
          document.body.appendChild(c);
          setTimeout(() => c.remove(), 4000);
        }, i * 30);
      }
    }
  </script>
</body>
</html>
